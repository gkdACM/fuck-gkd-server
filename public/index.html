<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>班级课表</title>
    <script>
      (() => {
        const key = "timetable_theme_v1";
        let preference = "system";
        try {
          const stored = localStorage.getItem(key);
          if (stored === "light" || stored === "dark" || stored === "system") {
            preference = stored;
          }
        } catch (error) {
          console.warn("read theme preference failed", error);
        }

        const prefersDark = window.matchMedia
          ? window.matchMedia("(prefers-color-scheme: dark)").matches
          : true;
        const applied = preference === "system"
          ? (prefersDark ? "dark" : "light")
          : preference;

        document.documentElement.dataset.themePreference = preference;
        document.documentElement.dataset.theme = applied;
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=10" />
    <link rel="manifest" href="./manifest.json" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1 id="viewTitle">学校课表</h1>
        <p id="status" class="status">加载中...</p>
      </header>

      <section class="toolbar">
        <label class="control">
          <span>年级</span>
          <select id="gradeSelect"></select>
        </label>

        <label class="control">
          <span>学院</span>
          <select id="collegeSelect"></select>
        </label>

        <label class="control">
          <span>专业</span>
          <select id="majorSelect"></select>
        </label>

        <label class="control">
          <span>班级</span>
          <select id="classSelect"></select>
        </label>

        <label class="control">
          <span>快捷班级</span>
          <select id="quickClassSelect">
            <option value="">收藏 / 最近访问</option>
          </select>
        </label>

        <label class="control">
          <span>班级检索</span>
          <input id="classFilterInput" type="search" placeholder="输入班级名/编号快速定位" />
        </label>

        <label class="control grow">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="搜索课程/教师/地点/周次" />
        </label>

        <label class="control">
          <span>周次筛选</span>
          <input id="weekFilterInput" type="search" placeholder="如 1-9 / 9 / 单周 / 双周" />
        </label>

        <label class="control">
          <span>当前周</span>
          <select id="weekNumberSelect">
            <option value="">全部周</option>
          </select>
        </label>

        <label class="control">
          <span>单双周</span>
          <select id="weekModeSelect">
            <option value="all">全部周</option>
            <option value="odd">仅单周</option>
            <option value="even">仅双周</option>
          </select>
        </label>

        <label class="control control-inline">
          <span>紧凑显示</span>
          <input id="compactToggle" type="checkbox" />
        </label>

        <label class="control control-inline">
          <span>启用 ICS</span>
          <input id="enableIcsToggle" type="checkbox" />
        </label>

        <label class="control">
          <span>主题</span>
          <select id="themeSelect">
            <option value="system">跟随系统</option>
            <option value="dark">深色</option>
            <option value="light">浅色</option>
          </select>
        </label>

        <label class="control">
          <span>开学周一</span>
          <input id="termStartInput" type="date" />
        </label>

        <div class="toolbar-actions">
          <button id="jumpCurrentWeekBtn" type="button">跳到本周</button>
          <button id="favoriteClassBtn" type="button">收藏当前班级</button>
          <button id="copyShareLinkBtn" type="button">复制分享链接</button>
          <button id="exportPngBtn" type="button">导出 PNG</button>
          <button id="exportCsvBtn" type="button">导出 CSV</button>
          <button id="exportIcsBtn" type="button" disabled>导出 ICS</button>
          <button id="reloadBtn" type="button">刷新数据</button>
        </div>
      </section>

      <section id="todaySchedule" class="today-schedule hidden"></section>

      <section id="tableContainer" class="table-wrap"></section>

      <div id="detailModal" class="detail-modal hidden" role="dialog" aria-modal="true" aria-hidden="true">
        <div id="detailModalBackdrop" class="detail-modal-backdrop"></div>
        <div class="detail-modal-panel" role="document">
          <div class="detail-modal-header">
            <h2 id="detailModalTitle">课程详情</h2>
            <button id="detailModalClose" type="button">关闭</button>
          </div>
          <div id="detailModalBody" class="detail-modal-body"></div>
        </div>
      </div>
      
      <!-- Toast Container -->
      <div id="toast-container" class="toast-container"></div>
      
      <!-- Loading Overlay -->
      <div id="loading-overlay" class="loading-overlay hidden">
          <div class="spinner"></div>
      </div>

    </main>
    <script src="./vendor/html2canvas.min.js"></script>
    <script type="module" src="./js/main.js?v=5"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
