<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>
        
        <!-- Toolbar Section -->
        <div class="toolbar">
            <!-- Hidden File Input for Import -->
            <input type="file" id="import-file" style="display: none;" accept=".json">

            <!-- Row 1: Data Controls -->
            <div class="toolbar-row data-controls">
                <button id="import-btn" class="btn secondary">Import JSON</button>
                <button id="export-img-btn" class="btn secondary">Export Image</button>
                <button id="export-ics-btn" class="btn secondary">Export ICS</button>
            </div>
            
            <!-- Row 2: Week Navigation -->
            <div class="toolbar-row week-controls">
                <button id="prev-week" class="nav-btn">&lt;</button>
                <div class="week-selector">
                    <span id="current-week-label">Week 1</span>
                    <select id="week-select">
                        <option value="all">All Weeks</option>
                        <!-- Options generated by JS -->
                    </select>
                </div>
                <button id="next-week" class="nav-btn">&gt;</button>
                <button id="reset-week" class="btn text-btn">This Week</button>
            </div>

            <!-- Row 3: Settings/Actions -->
            <div class="toolbar-row action-controls">
                <div class="setting-group">
                    <label>Start Date:</label>
                    <input type="date" id="term-start" value="2024-02-26">
                </div>
                <div class="toggle-group">
                    <label><input type="checkbox" id="show-weekends"> Weekends</label>
                </div>
            </div>
        </div>

        <!-- Today's Schedule Module -->
        <section id="today-schedule" class="today-module">
            <h2>Today's Schedule <span id="current-date"></span></h2>
            <div id="today-grid" class="today-grid">
                <!-- Content injected by JS -->
                <div class="empty-state">Loading...</div>
            </div>
        </section>

        <!-- Full Schedule Grid -->
        <section id="full-schedule">
            <h2>Weekly Schedule</h2>
            <div class="schedule-grid">
                <div class="header-cell">Time</div>
                <div class="header-cell">Mon</div>
                <div class="header-cell">Tue</div>
                <div class="header-cell">Wed</div>
                <div class="header-cell">Thu</div>
                <div class="header-cell">Fri</div>
                <!-- Time slots and course cells injected by JS -->
            </div>
        </section>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
