name: Import Timetable Data

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 课表 JSON 字符串，或 Base64(JSON)
        required: true
        type: string
      input_format:
        description: 输入格式
        required: true
        type: choice
        default: auto
        options:
          - auto
          - json
          - base64
      commit_changes:
        description: 是否提交到仓库
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: 是否立即部署 GitHub Pages
        required: true
        type: boolean
        default: true
      commit_message:
        description: 提交信息
        required: false
        type: string
        default: "data: import timetable via action"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  import:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write timetable data from input
        env:
          PAYLOAD: ${{ inputs.payload }}
          INPUT_FORMAT: ${{ inputs.input_format }}
        run: |
          python <<'PY'
          import base64
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path


          def parse_json(raw: str):
              return json.loads(raw)


          def parse_base64_json(raw: str):
              text = raw.strip()
              remainder = len(text) % 4
              if remainder:
                  text += "=" * (4 - remainder)
              decoded = base64.b64decode(text).decode("utf-8")
              return json.loads(decoded)


          payload = os.environ.get("PAYLOAD", "").strip()
          input_format = os.environ.get("INPUT_FORMAT", "auto").strip().lower()

          if not payload:
              raise ValueError("payload 为空")

          if input_format == "json":
              data = parse_json(payload)
          elif input_format == "base64":
              data = parse_base64_json(payload)
          else:
              try:
                  data = parse_json(payload)
              except Exception:
                  data = parse_base64_json(payload)

          if not isinstance(data, dict):
              raise ValueError("payload 解析后必须是 JSON 对象")

          if not str(data.get("generated_at", "")).strip():
              data["generated_at"] = datetime.now(timezone.utc).isoformat()

          if not str(data.get("source", "")).strip():
              data["source"] = "manual-import-action"

          classes = data.get("classes")
          if isinstance(classes, list):
              if not classes:
                  raise ValueError("classes 不能为空数组")

              for index, class_item in enumerate(classes, start=1):
                  if not isinstance(class_item, dict):
                      raise ValueError("classes 中每一项必须是对象")

                  if not str(class_item.get("id", "")).strip():
                      class_item["id"] = f"class-{index}"

                  if not str(class_item.get("name", "")).strip():
                      class_item["name"] = class_item["id"]

                  slots = class_item.get("slots")
                  if not isinstance(slots, list):
                      raise ValueError("每个 class 必须包含 slots 数组")

                  if slots and not all(isinstance(item, dict) for item in slots):
                      raise ValueError("slots 中每一项必须是对象")

              if "periods" not in data:
                  data["periods"] = [
                      {"id": "1-2", "label": "1-2", "session": "上午"},
                      {"id": "3-4", "label": "3-4", "session": "上午"},
                      {"id": "5-6", "label": "5-6", "session": "下午"},
                      {"id": "7-8", "label": "7-8", "session": "下午"},
                      {"id": "9-11", "label": "9-11", "session": "晚上"},
                  ]

              output_path = Path("public/timetables.json")
              row_count = sum(len(item.get("slots", [])) for item in classes)
              print(f"detected multi-class payload: {len(classes)} classes, {row_count} slots")
          else:
              rows = data.get("rows")
              if not isinstance(rows, list):
                  raise ValueError("payload 必须包含 rows 数组，或 classes 数组")
              if rows and not all(isinstance(item, dict) for item in rows):
                  raise ValueError("rows 中每一项必须是对象")

              if "headers" not in data and rows:
                  data["headers"] = list(rows[0].keys())

              if "entries" not in data:
                  data["entries"] = []

              output_path = Path("public/timetable.json")
              print(f"detected legacy payload: {len(rows)} rows")

          output_path.parent.mkdir(parents=True, exist_ok=True)
          output_path.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")

          print(f"wrote {output_path}")
          PY

      - name: Commit if changed
        if: ${{ inputs.commit_changes }}
        run: |
          git add public
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "${{ inputs.commit_message }}"
          git push

      - name: Setup Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v4
